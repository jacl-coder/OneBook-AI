services:
  postgres:
    image: postgres:16
    container_name: onebook-postgres
    environment:
      POSTGRES_USER: onebook
      POSTGRES_PASSWORD: onebook
      POSTGRES_DB: onebook
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: onebook-redis
    ports:
      - "6379:6379"
  kafka:
    image: apache/kafka:3.8.0
    container_name: onebook-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    ports:
      - "9092:9092"
    volumes:
      - ./docker/kafka-data:/tmp/kraft-combined-logs
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: onebook-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker/qdrant-data:/qdrant/storage
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: onebook-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./docker/opensearch-data:/usr/share/opensearch/data
  minio:
    image: minio/minio:latest
    container_name: onebook-minio
    environment:
      MINIO_ROOT_USER: onebook
      MINIO_ROOT_PASSWORD: onebook123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio-data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "sleep 2; mc alias set local http://minio:9000 onebook onebook123; mc mb -p local/onebook; exit 0"
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: onebook-swagger-ui
    environment:
      URLS: '[{"url":"/specs/openapi.yaml","name":"Gateway"},{"url":"/specs/openapi-internal.yaml","name":"Internal"}]'
      URLS_PRIMARY_NAME: "Gateway"
    ports:
      - "8086:8080"
    volumes:
      - ./backend/api/rest:/usr/share/nginx/html/specs:ro
  ocr-service:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: onebook-ocr
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      OCR_PORT: "8087"
    ports:
      - "8087:8087"
    volumes:
      # Cache downloaded models across restarts
      - onebook-ocr-models:/root/.paddlex
    restart: unless-stopped
  reranker-service:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
    container_name: onebook-reranker
    environment:
      RERANKER_PORT: "8088"
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_MODEL_REVISION: ${RERANKER_MODEL_REVISION:-}
      RERANKER_CACHE_DIR: ${RERANKER_CACHE_DIR:-/models/huggingface}
      HF_HOME: ${RERANKER_CACHE_DIR:-/models/huggingface}
      SENTENCE_TRANSFORMERS_HOME: ${RERANKER_SENTENCE_TRANSFORMERS_HOME:-/models/huggingface/sentence-transformers}
      RERANKER_MAX_DOCS: ${RERANKER_MAX_DOCS:-50}
      RERANKER_MAX_CHARS: ${RERANKER_MAX_CHARS:-2400}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-8}
    ports:
      - "8088:8088"
    volumes:
      # Cache downloaded Hugging Face / sentence-transformers models across restarts
      - onebook-reranker-models:/models/huggingface
    restart: unless-stopped
volumes:
  onebook-ocr-models:
  onebook-reranker-models:
