services:
  postgres:
    image: postgres:16
    container_name: onebook-postgres
    environment:
      POSTGRES_USER: onebook
      POSTGRES_PASSWORD: onebook
      POSTGRES_DB: onebook
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: onebook-redis
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: onebook-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "onebook"
      RABBITMQ_DEFAULT_PASS: "onebook"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker/rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: onebook-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker/qdrant-data:/qdrant/storage
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: onebook-opensearch
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./docker/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - ./docker/opensearch-data:/usr/share/opensearch/data
  minio:
    image: minio/minio:latest
    container_name: onebook-minio
    environment:
      MINIO_ROOT_USER: onebook
      MINIO_ROOT_PASSWORD: onebook123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio-data:/data
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: onebook-swagger-ui
    environment:
      URLS: '[{"url":"/specs/openapi.yaml","name":"Gateway"},{"url":"/specs/openapi-internal.yaml","name":"Internal"}]'
      URLS_PRIMARY_NAME: "Gateway"
    ports:
      - "8089:8080"
    volumes:
      - ./backend/api/rest:/usr/share/nginx/html/specs:ro
  ocr-service:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
      args:
        OCR_PADDLE_PACKAGE: ${OCR_PADDLE_PACKAGE:-paddlepaddle==3.0.0}
        OCR_PADDLE_INDEX: ${OCR_PADDLE_INDEX:-https://www.paddlepaddle.org.cn/packages/stable/cpu/}
    container_name: onebook-ocr
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      OCR_PORT: "8087"
      OCR_DEVICE: ${OCR_DEVICE:-cpu}
      OCR_ENABLE_HPI: ${OCR_ENABLE_HPI:-false}
    ports:
      - "8087:8087"
    shm_size: "8gb"
    volumes:
      # Cache downloaded models across restarts
      - onebook-ocr-models:/root/.paddlex
    restart: unless-stopped
  reranker-service:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
    container_name: onebook-reranker
    environment:
      RERANKER_PORT: "8088"
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_MODEL_REVISION: ${RERANKER_MODEL_REVISION:-}
      RERANKER_CACHE_DIR: ${RERANKER_CACHE_DIR:-/models/huggingface}
      HF_HOME: ${RERANKER_CACHE_DIR:-/models/huggingface}
      SENTENCE_TRANSFORMERS_HOME: ${RERANKER_SENTENCE_TRANSFORMERS_HOME:-/models/huggingface/sentence-transformers}
      RERANKER_MAX_DOCS: ${RERANKER_MAX_DOCS:-50}
      RERANKER_MAX_CHARS: ${RERANKER_MAX_CHARS:-2400}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-8}
    ports:
      - "8088:8088"
    volumes:
      # Cache downloaded Hugging Face / sentence-transformers models across restarts
      - onebook-reranker-models:/models/huggingface
    restart: unless-stopped
volumes:
  onebook-ocr-models:
  onebook-reranker-models:
