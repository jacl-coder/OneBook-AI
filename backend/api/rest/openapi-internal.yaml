openapi: 3.0.3
info:
  title: OneBook AI Internal API
  version: 0.1.0
  description: |
    Internal service APIs (book/chat/ingest/indexer). Do not expose publicly.
    Internal services propagate `X-Request-Id` and include the same value in
    error payload field `requestId`.
servers:
  - url: http://localhost:8082
    description: Local dev (auth service)
  - url: http://localhost:8083
    description: Local dev (book service)
  - url: http://localhost:8084
    description: Local dev (chat service)
  - url: http://localhost:8085
    description: Local dev (ingest service)
  - url: http://localhost:8086
    description: Local dev (indexer service)
tags:
  - name: auth-admin
    description: Auth/admin internal endpoints
  - name: internal-book
    description: Book service internal endpoints
  - name: chat-internal
    description: Chat service internal endpoint
  - name: ingest
    description: Ingest pipeline (internal)
  - name: indexer
    description: Indexer pipeline (internal)
paths:
  /healthz:
    get:
      tags: [internal-book, chat-internal, ingest, indexer]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/oauth/complete:
    post:
      tags: [auth-admin]
      summary: Complete OAuth login with verified provider identity
      description: Called by Gateway after OAuth provider identity validation to bind or create a local user and issue OneBook tokens. Current external provider implementations are Google and Microsoft.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthCompleteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid OAuth identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: User disabled or credentials rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/books/{id}/file:
    get:
      tags: [internal-book]
      summary: Get book file download URL
      security:
        - internalToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalBookFileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/books/{id}/status:
    patch:
      tags: [internal-book]
      summary: Update book status
      security:
        - internalToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookStatusUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chats:
    post:
      tags: [chat-internal]
      summary: Ask a question (chat service)
      description: |
        The chat service may include recent conversation history when
        generating the answer (history length is configurable). Obvious follow-up
        questions may be answered from recent conversation history without a new
        retrieval pass, while obvious out-of-scope realtime questions are
        rejected instead of querying the book index.
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatServiceRequest"
      responses:
        "200":
          description: |
            OK. When the caller sends `Accept: text/event-stream`, the chat
            service responds as Server-Sent Events with `chunk`, `final`, and
            `error` events. `final` carries the same payload as the JSON
            response.
          headers:
            Idempotency-Replayed:
              schema:
                type: string
                enum: ["true"]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
            text/event-stream:
              schema:
                type: string
              examples:
                stream:
                  value: |
                    event: chunk
                    data: {"delta":"第一段回答"}

                    event: final
                    data: {"conversation":{"id":"conv_123","userId":"user_123","title":"示例问题","createdAt":"2026-04-11T11:00:00Z","updatedAt":"2026-04-11T11:00:02Z"},"question":"示例问题","answer":"第一段回答","citations":[],"abstained":false,"createdAt":"2026-04-11T11:00:02Z"}
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Book not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /conversations:
    get:
      tags: [chat-internal]
      summary: List conversation history
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConversationsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /conversations/{id}/messages:
    get:
      tags: [chat-internal]
      summary: List messages of one conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConversationMessagesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ingest/jobs:
    post:
      tags: [ingest]
      summary: Create ingest job
      description: |
        Enqueue an ingest job into the RabbitMQ-backed queue. Retries and
        failure handling are performed by the worker.
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJob"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ingest/jobs/{id}:
    get:
      tags: [ingest]
      summary: Get ingest job
      description: Fetch ingest job status and metadata by job id.
      security:
        - internalToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /indexer/jobs:
    post:
      tags: [indexer]
      summary: Create index job
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexJob"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /indexer/jobs/{id}:
    get:
      tags: [indexer]
      summary: Get index job
      security:
        - internalToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/admin/evals/overview:
    get:
      tags: [auth-admin]
      summary: Get eval center overview
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEvalOverview"
  /auth/admin/evals/datasets:
    get:
      tags: [auth-admin]
      summary: List eval datasets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedEvalDatasetsResponse"
    post:
      tags: [auth-admin]
      summary: Create eval dataset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                sourceType:
                  type: string
                bookId:
                  type: string
                version:
                  type: integer
                description:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalDataset"
  /auth/admin/evals/datasets/{id}:
    get:
      tags: [auth-admin]
      summary: Get eval dataset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalDataset"
    patch:
      tags: [auth-admin]
      summary: Update eval dataset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalDatasetUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalDataset"
    delete:
      tags: [auth-admin]
      summary: Delete or archive eval dataset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /auth/admin/evals/runs:
    get:
      tags: [auth-admin]
      summary: List eval runs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedEvalRunsResponse"
    post:
      tags: [auth-admin]
      summary: Create eval run
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRunCreateRequest"
      responses:
        "200":
          description: Replay hit
          headers:
            Idempotency-Replayed:
              schema:
                type: string
                enum: ["true"]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "409":
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/admin/evals/runs/{id}:
    get:
      tags: [auth-admin]
      summary: Get eval run
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
  /auth/admin/evals/runs/{id}/cancel:
    post:
      tags: [auth-admin]
      summary: Cancel eval run
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
  /auth/admin/evals/runs/{id}/per-query:
    get:
      tags: [auth-admin]
      summary: Get per-query rows
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalPerQueryResponse"
components:
  securitySchemes:
    internalToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal short-lived service JWT (RS256).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Stable machine-readable error code.
        requestId:
          type: string
          description: Request correlation id, when provided by caller/gateway.
        details:
          type: array
          description: Optional field-level validation details.
          items:
            $ref: "#/components/schemas/ErrorDetail"
      required: [error, code]
      example:
        error: unauthorized
        code: AUTH_INVALID_TOKEN
        requestId: req-demo-20260213-001
        details:
          - reason: missing_or_invalid_bearer_token
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required: [reason]
    OAuthCompleteRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [google]
        subject:
          type: string
        email:
          type: string
          format: email
        emailVerified:
          type: boolean
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
      required: [provider, subject, emailVerified]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, refreshToken, user]
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, role, status, createdAt, updatedAt]
    Book:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        title:
          type: string
        originalFilename:
          type: string
        primaryCategory:
          type: string
          enum: [course_material, research_paper, project_doc, policy_regulation, reference_book, personal_note, how_to_guide, other]
        tags:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [pdf, epub, txt]
        language:
          type: string
          enum: [zh, en, other, unknown]
        documentType:
          type: string
          description: Inferred document-level type used by overview routing.
        documentSummary:
          type: string
          description: Inferred document-level summary.
        firstPageText:
          type: string
          description: Extracted first-page or leading text for overview questions.
        keywords:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [queued, processing, ready, failed]
        errorMessage:
          type: string
        sizeBytes:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, ownerId, title, originalFilename, primaryCategory, tags, format, language, status, sizeBytes, createdAt, updatedAt]
    InternalBookFileResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
        filename:
          type: string
      required: [url, filename]
    BookStatusUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [queued, processing, ready, failed]
        errorMessage:
          type: string
        generation:
          type: integer
          format: int64
      required: [status]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Source:
      type: object
      properties:
        label:
          type: string
        location:
          type: string
        snippet:
          type: string
      required: [label, location, snippet]
    Answer:
      type: object
      properties:
        conversationId:
          type: string
        bookId:
          type: string
        question:
          type: string
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        createdAt:
          type: string
          format: date-time
      required: [conversationId, bookId, question, answer, sources, createdAt]
    ChatServiceRequest:
      type: object
      properties:
        conversationId:
          type: string
        bookId:
          type: string
        question:
          type: string
        debug:
          type: boolean
      required: [bookId, question]
    ConversationSummary:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        bookId:
          type: string
        title:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, title, createdAt, updatedAt]
    ConversationMessage:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        userId:
          type: string
        bookId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, bookId, role, content, createdAt]
    ListConversationsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConversationSummary"
        count:
          type: integer
      required: [items, count]
    ListConversationMessagesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMessage"
        count:
          type: integer
      required: [items, count]
    IngestRequest:
      type: object
      properties:
        bookId:
          type: string
        generation:
          type: integer
          format: int64
      required: [bookId]
    IndexRequest:
      type: object
      properties:
        bookId:
          type: string
        generation:
          type: integer
          format: int64
      required: [bookId]
    IngestJob:
      type: object
      properties:
        id:
          type: string
        bookId:
          type: string
        status:
          type: string
          enum: [queued, processing, done, failed]
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, bookId, status, createdAt, updatedAt]
    IndexJob:
      type: object
      properties:
        id:
          type: string
        bookId:
          type: string
        status:
          type: string
          enum: [queued, processing, done, failed]
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, bookId, status, createdAt, updatedAt]
    AdminEvalOverview:
      type: object
      properties:
        totalDatasets:
          type: integer
        activeDatasets:
          type: integer
        totalRuns:
          type: integer
        queuedRuns:
          type: integer
        runningRuns:
          type: integer
        successfulRuns:
          type: integer
        failedRuns:
          type: integer
        canceledRuns:
          type: integer
        recentRuns:
          type: integer
        recentGateFailed:
          type: integer
        successRate:
          type: number
          format: float
        refreshedAt:
          type: string
          format: date-time
    EvalDataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sourceType:
          type: string
          enum: [upload, book]
        bookId:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [active, archived]
        description:
          type: string
        files:
          type: object
          additionalProperties:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    EvalDatasetUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, archived]
    PagedEvalDatasetsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EvalDataset"
        count:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    EvalRunArtifact:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        contentType:
          type: string
