components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: onebook_access
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Stable machine-readable error code (domain-specific, e.g. AUTH_INVALID_CREDENTIALS / BOOK_NOT_FOUND / CHAT_BOOK_NOT_READY).
        requestId:
          type: string
          description: Request correlation id, same as response header X-Request-Id.
        details:
          type: array
          description: Optional field-level validation details.
          items:
            $ref: "#/components/schemas/ErrorDetail"
      required: [error, code]
      example:
        error: book not ready
        code: CHAT_BOOK_NOT_READY
        requestId: req-demo-20260213-001
        details:
          - reason: book_status_conflict
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required: [reason]
    AuthRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required: [user]
    LoginMethodsRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    LoginMethodsResponse:
      type: object
      properties:
        passwordLogin:
          type: boolean
          description: |
            Whether the client should continue with password login flow.
            false means continue with OTP flow.
      required: [passwordLogin]
    OtpPurpose:
      type: string
      enum: [signup_password, signup_otp, login_otp, reset_password]
      description: |
        OTP flow purpose:
        - signup_password: password registration (set password first, then OTP)
        - signup_otp: passwordless registration
        - login_otp: OTP login
        - reset_password: forgot-password verification
    OtpSendRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        purpose:
          $ref: "#/components/schemas/OtpPurpose"
      required: [email, purpose]
    OtpSendResponse:
      type: object
      properties:
        challengeId:
          type: string
        expiresInSeconds:
          type: integer
          minimum: 1
        resendAfterSeconds:
          type: integer
          minimum: 0
        maskedEmail:
          type: string
      required: [challengeId, expiresInSeconds, resendAfterSeconds]
    OtpVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        email:
          type: string
          format: email
        purpose:
          $ref: "#/components/schemas/OtpPurpose"
        code:
          type: string
          minLength: 4
          maxLength: 8
        password:
          type: string
          description: Required when purpose is `signup_password`.
          minLength: 12
      required: [challengeId, email, purpose, code]
    PasswordResetVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 4
          maxLength: 8
      required: [challengeId, email, code]
    PasswordResetVerifyResponse:
      type: object
      properties:
        resetToken:
          type: string
        expiresInSeconds:
          type: integer
          minimum: 1
      required: [resetToken, expiresInSeconds]
    PasswordResetCompleteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        resetToken:
          type: string
        newPassword:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [email, resetToken, newPassword]
    JWK:
      type: object
      properties:
        kty:
          type: string
        use:
          type: string
        kid:
          type: string
        alg:
          type: string
        n:
          type: string
        e:
          type: string
      required: [kty, use, kid, alg, n, e]
    JWKSResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JWK"
      required: [keys]
    UpdateMeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          description: |
            Required for accounts that already have a password.
            Optional for passwordless accounts setting password for the first time.
        newPassword:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [newPassword]
    AdminUserUpdateRequest:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, role, status, createdAt, updatedAt]
    Book:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        title:
          type: string
        originalFilename:
          type: string
        primaryCategory:
          type: string
          enum: [course_material, research_paper, project_doc, policy_regulation, reference_book, personal_note, how_to_guide, other]
        tags:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [pdf, epub, txt]
        language:
          type: string
          enum: [zh, en, other, unknown]
        status:
          type: string
          enum: [queued, processing, ready, failed]
        errorMessage:
          type: string
        sizeBytes:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        [
          id,
          ownerId,
          title,
          originalFilename,
          primaryCategory,
          tags,
          format,
          language,
          status,
          sizeBytes,
          createdAt,
          updatedAt,
        ]
    UpdateBookRequest:
      type: object
      properties:
        title:
          type: string
        primaryCategory:
          type: string
          enum: [course_material, research_paper, project_doc, policy_regulation, reference_book, personal_note, how_to_guide, other]
        tags:
          type: array
          items:
            type: string
      required: [title, primaryCategory, tags]
    Source:
      type: object
      properties:
        label:
          type: string
        location:
          type: string
        snippet:
          type: string
        chunkId:
          type: string
        sourceRef:
          type: string
        score:
          type: number
          format: double
        language:
          type: string
      required: [label, location, snippet]
    Answer:
      type: object
      properties:
        conversation:
          $ref: "#/components/schemas/ConversationSummary"
        question:
          type: string
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        abstained:
          type: boolean
        retrievalDebug:
          $ref: "#/components/schemas/RetrievalDebug"
        createdAt:
          type: string
          format: date-time
      required: [conversation, question, answer, citations, abstained, createdAt]
    ChatRequest:
      type: object
      properties:
        conversationId:
          type: string
        bookId:
          type: string
        question:
          type: string
        debug:
          type: boolean
      required: [bookId, question]
    RetrievalHit:
      type: object
      properties:
        chunkId:
          type: string
        sourceRef:
          type: string
        score:
          type: number
          format: double
        stage:
          type: string
        snippet:
          type: string
      required: [chunkId, score, stage]
    RetrievalDebug:
      type: object
      properties:
        language:
          type: string
        queries:
          type: array
          items:
            type: string
        dense:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalHit"
        lexical:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalHit"
        fused:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalHit"
        reranked:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalHit"
      required: [language, queries, dense, lexical, fused, reranked]
    ConversationSummary:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        bookId:
          type: string
        title:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, title, createdAt, updatedAt]
    ConversationMessage:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        userId:
          type: string
        bookId:
          type: string
        role:
          type: string
