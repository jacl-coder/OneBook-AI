components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: onebook_access
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Stable machine-readable error code (domain-specific, e.g. AUTH_INVALID_CREDENTIALS / BOOK_NOT_FOUND / CHAT_BOOK_NOT_READY).
        requestId:
          type: string
          description: Request correlation id, same as response header X-Request-Id.
        details:
          type: array
          description: Optional field-level validation details.
          items:
            $ref: "#/components/schemas/ErrorDetail"
      required: [error, code]
      example:
        error: book not ready
        code: CHAT_BOOK_NOT_READY
        requestId: req-demo-20260213-001
        details:
          - reason: book_status_conflict
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required: [reason]
    AuthRequest:
      type: object
      properties:
        identifier:
          type: string
          description: Email or China mainland phone number.
        password:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [identifier, password]
    SignupCompleteRequest:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/VerificationChannel"
        identifier:
          type: string
        verificationToken:
          type: string
        password:
          type: string
          minLength: 12
      required: [channel, identifier, verificationToken, password]
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required: [user]
    LoginMethodsRequest:
      type: object
      properties:
        identifier:
          type: string
          description: Email or China mainland phone number.
      required: [identifier]
    LoginMethodsResponse:
      type: object
      properties:
        exists:
          type: boolean
          description: Whether a verified identity already exists for the identifier.
        passwordLogin:
          type: boolean
          description: |
            Whether the client should continue with password login flow.
            false means continue with OTP flow.
      required: [exists, passwordLogin]
    OtpPurpose:
      type: string
      enum: [signup, login, password_reset]
      description: |
        OTP flow purpose:
        - signup: verify identifier before password registration
        - login: OTP login
        - password_reset: forgot-password verification
    VerificationChannel:
      type: string
      enum: [email, phone]
    OtpSendRequest:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/VerificationChannel"
        identifier:
          type: string
          description: Email or China mainland phone number.
        purpose:
          $ref: "#/components/schemas/OtpPurpose"
      required: [channel, identifier, purpose]
    OtpSendResponse:
      type: object
      properties:
        challengeId:
          type: string
        expiresInSeconds:
          type: integer
          minimum: 1
        resendAfterSeconds:
          type: integer
          minimum: 0
        maskedEmail:
          type: string
        maskedIdentifier:
          type: string
      required: [challengeId, expiresInSeconds, resendAfterSeconds]
    OtpVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        channel:
          $ref: "#/components/schemas/VerificationChannel"
        identifier:
          type: string
        purpose:
          $ref: "#/components/schemas/OtpPurpose"
        code:
          type: string
          minLength: 4
          maxLength: 8
      required: [challengeId, channel, identifier, purpose, code]
    VerificationVerifyResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        verificationToken:
          type: string
        resetToken:
          type: string
          deprecated: true
        expiresInSeconds:
          type: integer
          minimum: 1
    PasswordResetVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        channel:
          $ref: "#/components/schemas/VerificationChannel"
        identifier:
          type: string
        code:
          type: string
          minLength: 4
          maxLength: 8
      required: [challengeId, channel, identifier, code]
    PasswordResetVerifyResponse:
      type: object
      properties:
        resetToken:
          type: string
          deprecated: true
        verificationToken:
          type: string
        expiresInSeconds:
          type: integer
          minimum: 1
      required: [verificationToken, expiresInSeconds]
    PasswordResetCompleteRequest:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/VerificationChannel"
        identifier:
          type: string
        verificationToken:
          type: string
        resetToken:
          type: string
          deprecated: true
        newPassword:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [channel, identifier, verificationToken, newPassword]
    JWK:
      type: object
      properties:
        kty:
          type: string
        use:
          type: string
        kid:
          type: string
        alg:
          type: string
        n:
          type: string
        e:
          type: string
      required: [kty, use, kid, alg, n, e]
    JWKSResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JWK"
      required: [keys]
    UpdateMeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          description: |
            Required for accounts that already have a password.
            Optional for passwordless accounts setting password for the first time.
        newPassword:
          type: string
          description: At least 12 chars and must include upper/lower/digit/special.
          minLength: 12
      required: [newPassword]
    AdminUserUpdateRequest:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, role, status, createdAt, updatedAt]
    Book:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        title:
          type: string
        originalFilename:
          type: string
        primaryCategory:
          type: string
          enum: [course_material, research_paper, project_doc, policy_regulation, reference_book, personal_note, how_to_guide, other]
        tags:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [pdf, epub, txt]
        language:
          type: string
          enum: [zh, en, other, unknown]
        status:
          type: string
          enum: [queued, processing, ready, failed]
        errorMessage:
          type: string
        sizeBytes:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        [
          id,
          ownerId,
          title,
          originalFilename,
          primaryCategory,
          tags,
          format,
          language,
          status,
          sizeBytes,
          createdAt,
          updatedAt,
        ]
    ChunkIndexStatus:
      type: object
      properties:
        chunkId:
          type: string
        bookId:
          type: string
        contentSha256:
          type: string
        embeddingModel:
          type: string
        embeddingDim:
          type: integer
        openSearchStatus:
          type: string
          enum: [pending, synced, failed]
        openSearchSyncedAt:
          type: string
          format: date-time
        qdrantStatus:
          type: string
          enum: [pending, synced, failed]
        qdrantSyncedAt:
          type: string
          format: date-time
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BookIndexStatusSummary:
      type: object
      properties:
        bookId:
